<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
   <title>Conversas</title>

    <link rel="stylesheet" href="./area.css">

<body>
 <div id="header-container"></div>

 <section class="area-card">
    <button type="button" class="btn-voltar" onclick="history.back()">
      <img src="/assets/voltar.png" alt="Voltar">
    </button>

   <h3>Conversas</h3>

  <div class="content">
    <main id="inbox" class="inbox"></main>
      <!-- ITEM DO CHAT -->
      <!--
      Estados esperados (JS controla classes/labels):

      1) Cliente recebeu mensagem:
         <span class="status status-sent">✓</span>

      2) Cliente leu e não respondeu:
         <span class="status status-read">✓✓</span>

      3) Modelo entrou no chat, leu e não respondeu:
         <span class="status status-reply">Necessita de resposta</span>

      4) Modelo ainda não visualizou:
         <span class="status status-unseen">Não visto</span>
      -->

  <script src="/socket.io/socket.io.js"></script>

</body>
</html>
