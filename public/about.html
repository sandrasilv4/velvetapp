  <style>
    :root {
      --primary: #6f3cff;
      --primary-dark: #5a2fe0;
      --primary-light: #ede8ff;
      --text: #1e1b2e;
      --text-soft: #5e5873;
      --bg: #f7f7fb;
      --card: #f1eef4;
      --line: #ddd8e6;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', Arial, Helvetica, sans-serif;
      line-height: 1.8;
    }

    /* ── Lang Switcher ── */
    .lang-switcher {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      max-width: 980px;
      margin: 20px auto 0;
      padding: 0 20px;
    }
    .lang-switcher button {
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .lang-switcher button:hover,
    .lang-switcher button.active {
      background: var(--card);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* ── Hero ── */
    .hero {
      background: none;
      text-align: center;
      padding: 72px 24px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-logo {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .hero-tagline {
      font-size: 1.18rem;
      font-weight: 400;
      opacity: 0.92;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Container ── */
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 52px 20px 80px;
    }

    /* ── Section Titles ── */
    .section-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 18px;
      line-height: 1.25;
    }
    .section-subtitle {
      font-size: 1.06rem;
      color: var(--text-soft);
      margin: -10px 0 28px;
    }

    p {
      margin: 0 0 14px;
      color: var(--text);
      font-size: 1.06rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 48px 0;
    }

    /* ── Mission Card ── */
    .mission-card {
      background: linear-gradient(135deg, var(--primary-light) 0%, #f9f6ff 100%);
      border: 1.5px solid #d6caff;
      border-radius: 20px;
      padding: 36px 36px;
      margin-bottom: 48px;
      position: relative;
    }
    .mission-card .quote-mark {
      font-size: 5rem;
      line-height: 1;
      color: var(--primary);
      opacity: 0.18;
      font-family: Georgia, serif;
      position: absolute;
      top: 12px;
      left: 24px;
    }
    .mission-text {
      font-size: 1.22rem;
      font-weight: 600;
      color: var(--primary-dark);
      line-height: 1.7;
      margin: 0;
    }

    /* ── Values Grid ── */
    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }
    .value-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 26px 24px;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .value-card:hover {
      box-shadow: 0 6px 24px rgba(111, 60, 255, 0.10);
      transform: translateY(-2px);
    }
    .value-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }
    .value-title {
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
    }
    .value-desc {
      font-size: 0.97rem;
      color: var(--text-soft);
      line-height: 1.65;
      margin: 0;
    }

    /* ── Stats Strip ── */
    .stats-strip {
      background: var(--card);
      border-radius: 18px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 24px;
      padding: 32px 24px;
      margin-bottom: 48px;
      text-align: center;
    }
    .stat-item .stat-number {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      display: block;
      line-height: 1.1;
    }
    .stat-item .stat-label {
      font-size: 0.92rem;
      color: var(--text-soft);
      margin-top: 4px;
    }

    /* ── Contact Box ── */
    .contact-box {
      background: var(--card);
      border-radius: 18px;
      padding: 30px 32px;
    }
    .contact-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }
    .contact-row:last-child { margin-bottom: 0; }
    .contact-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .contact-label {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-soft);
      margin-bottom: 2px;
    }
    .contact-value {
      font-size: 1.03rem;
      color: var(--text);
      margin: 0;
    }
    a.inline-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    a.inline-link:hover { text-decoration: underline; }

    /* ── Social Pills ── */
    .social-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .social-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 7px 16px;
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: 0.2s ease;
    }
    .social-pill:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 60px;
      padding: 20px;
      background: none;
      color: #1E1E26;
      text-align: center;
      font-size: 14px;
    }
    .footer-links { margin-bottom: 10px; }
    .footer-links a {
      color: #1E1E26;
      margin: 0 10px;
      text-decoration: none;
    }
    .footer-links a:hover {
      color: #C9C9C9;
      text-decoration: underline;
    }
    .footer-copy {
      font-size: 12px;
      color: #1E1E26;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .lang-switcher { justify-content: center; padding: 0 16px; }
      .container { padding: 32px 16px 60px; }
      .hero { padding: 52px 20px 60px; }
      .hero-logo { font-size: 2rem; }
      .section-title { font-size: 1.6rem; }
      .mission-card { padding: 28px 22px; }
      .mission-text { font-size: 1.08rem; }
      .contact-box { padding: 22px 18px; }
      .stats-strip { padding: 24px 16px; }
    }

.logo {
  width: 250px; 
}
  </style>
</head>

    function renderPage(lang) {
      const t = translations[lang] || translations.pt;
      document.documentElement.lang = t.htmlLang;
      document.title = t.title;

      document.getElementById("heroTagline").textContent = t.heroTagline;
      document.getElementById("missionTitle").textContent = t.missionTitle;
      document.getElementById("missionQuote").textContent = t.missionQuote;
      document.getElementById("missionBody1").textContent = t.missionBody1;
      document.getElementById("missionBody2").textContent = t.missionBody2;
      document.getElementById("valuesTitle").textContent = t.valuesTitle;
      document.getElementById("valuesSubtitle").textContent = t.valuesSubtitle;

      const grid = document.getElementById("valuesGrid");
      grid.innerHTML = "";
      t.values.forEach(v => {
        grid.innerHTML += `
          <div class="value-card">
            <span class="value-icon">${v.icon}</span>
            <div class="value-title">${v.title}</div>
            <p class="value-desc">${v.desc}</p>
          </div>`;
      });

      document.getElementById("statsTitle").textContent = t.statsTitle;
      const strip = document.getElementById("statsStrip");
      strip.innerHTML = "";
      t.stats.forEach(s => {
        strip.innerHTML += `
          <div class="stat-item">
            <span class="stat-number">${s.number}</span>
            <div class="stat-label">${s.label}</div>
          </div>`;
      });

      document.getElementById("contactTitle").textContent = t.contactTitle;
      document.getElementById("contactIntro").textContent = t.contactIntro;
      document.getElementById("labelAddress").textContent = t.labelAddress;
      document.getElementById("labelEmail").textContent = t.labelEmail;
      document.getElementById("labelSocial").textContent = t.labelSocial;

      document.getElementById("footerTerms").textContent = t.footerTerms;
      document.getElementById("footerPrivacy").textContent = t.footerPrivacy;
      document.getElementById("footerPolicies").textContent = t.footerPolicies;
      document.getElementById("footerCopy").textContent = t.footerCopy;

      document.querySelectorAll("[data-lang]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      localStorage.setItem("velvet_lang", lang);
    }

    document.querySelectorAll("[data-lang]").forEach(button => {
      button.addEventListener("click", () => renderPage(button.dataset.lang));
    });

    const savedLang = localStorage.getItem("velvet_lang") || "pt";
    renderPage(savedLang);
  </script>
