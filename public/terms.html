      max-width: 980px;
      margin: 20px auto 0;
      padding: 0 20px;
    }

      background: var(--white);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .lang-switcher button:hover,
    .lang-switcher button.active {
      background: var(--card);
      color: var(--primary);
      border-color: var(--primary);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 22px;
      line-height: 1.2;
      text-align: center;
    }

      font-size: 1.08rem;
      color: var(--text);

    }

    .toc {
      background: var(--card);
      border-radius: 18px;
      padding: 26px 28px;
      margin: 28px 0 48px;
    }

    .toc h2 {
      margin: 0 0 18px;
      font-size: 1.5rem;
      color: var(--text);
    }

    .toc ol {
      margin: 0;
      padding-left: 22px;
      columns: 1;
    }

    .toc li {
      margin-bottom: 10px;
      color: var(--text);
    }

    .toc a {
      color: var(--text);
      text-decoration: none;
      transition: 0.2s ease;
    }

    .toc a:hover {
      color: var(--primary);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 42px 0;
    }

    section {
      scroll-margin-top: 30px;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 600;
      color: var(--primary);
      margin: 0 0 20px;
      line-height: 1.25;
    }

    .item-title {
      font-size: 1.12rem;
      font-weight: 700;
      color: var(--text);
      margin: 22px 0 8px;
    }

    p {
      margin: 0 0 14px;
      color: var(--text);
      font-size: 1.06rem;
    }

    ul {
      margin: 10px 0 18px 0;
      padding-left: 22px;
    }

    li {
      margin-bottom: 6px;
      font-size: 1.04rem;
    }

    .contact-box {
      background: var(--card);
      border-radius: 16px;
      padding: 20px 22px;
      margin-top: 16px;
    }

    a.inline-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    a.inline-link:hover {
      text-decoration: underline;
    }

    .last-updated {
      margin: 0 0 24px;
      padding: 10px 16px;
      background: #f3eff5;
      color: #1e1b2e;
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.5;
      text-align: center;
    }

    .footer {
      margin-top: 60px;
      padding: 20px;
      background: none;
      color: #1E1E26;
      text-align: center;
      font-size: 14px;
    }

    .footer-links {
      margin-bottom: 10px;
    }

      color: #1E1E26;
      margin: 0 10px;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #C9C9C9;
      text-decoration: underline;
    }

    .footer-copy {
      font-size: 12px;
      color: #1E1E26;
    }

      .lang-switcher {
        justify-content: center;
        padding: 0 16px;
      }

      }

        font-size: 1.9rem;
      }

      .section-title {
        font-size: 1.65rem;
      }

      .toc {
        padding: 22px 20px;
      }

      p, li {
        font-size: 1rem;
      }
    }
  </style>
</head>

    function renderPage(lang) {
      const t = translations[lang] || translations.pt;

      document.documentElement.lang = t.htmlLang;
      document.title = t.title;

      document.getElementById("pageTitle").textContent = t.pageTitle;
      document.getElementById("lastUpdatedLabel").textContent = t.lastUpdatedLabel;
      document.getElementById("lastUpdatedDate").textContent = t.lastUpdatedDate;
      document.getElementById("introText").textContent = t.introText;

      const toc = document.getElementById("toc");
      const tocTitle = document.getElementById("tocTitle");
      const tocList = document.getElementById("tocList");
      toc.setAttribute("aria-label", t.tocAriaLabel);
      tocTitle.textContent = t.tocTitle;
      tocList.innerHTML = "";

      t.tocItems.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="#secao-${index + 1}">${item}</a>`;
        tocList.appendChild(li);
      });

      const sectionsContainer = document.getElementById("sectionsContainer");
      sectionsContainer.innerHTML = "";

      t.sections.forEach((section, index) => {
        const sectionEl = document.createElement("section");
        sectionEl.id = section.id;
        sectionEl.innerHTML = `
          <h2 class="section-title">${section.title}</h2>
          ${section.content}
        `;
        sectionsContainer.appendChild(sectionEl);

        if (index < t.sections.length - 1) {
          const hr = document.createElement("hr");
          hr.className = "divider";
          sectionsContainer.appendChild(hr);
        }
      });

      document.getElementById("footerTerms").textContent = t.footerTerms;
      document.getElementById("footerPrivacy").textContent = t.footerPrivacy;
      document.getElementById("footerPolicies").textContent = t.footerPolicies;
      document.getElementById("footerCopy").textContent = t.footerCopy;

      document.querySelectorAll("[data-lang]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      localStorage.setItem("velvet_lang", lang);
    }

    document.querySelectorAll("[data-lang]").forEach(button => {
      button.addEventListener("click", () => {
        renderPage(button.dataset.lang);
      });
    });

    const savedLang = localStorage.getItem("velvet_lang") || "pt";
    renderPage(savedLang);
  </script>
