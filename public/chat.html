<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Chat</title>
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/chatmodelo.css">
  <link rel="stylesheet" href="/css/header.css">

  <script src="/i18n.js"></script>
</head>

<body class="role-modelo">
  <div id="header-container"></div>

<header class="chat-topo">
  <button type="button" class="btn-voltar" onclick="window.location.href='/inbox.html'">
    <img src="/assets/voltar.png" data-i18n-alt="chat.back_alt" alt="Voltar">
  </button>

  <div class="chat-cliente-info">
    <img id="chatClienteAvatar" class="chat-avatar" src="/assets/avatar.png" data-i18n-alt="chat.client_avatar_alt" alt="Avatar cliente" />

    <div class="chat-cliente-texto">
      <div class="chat-nome-linha">
        <div id="chatClienteNome" class="chat-nome" data-i18n="chat.client_name_placeholder">Cliente</div>

        <span id="chatClienteResumo" class="chat-cliente-resumo" style="display:none;"></span>

        <button
          id="btnAnotacoesCliente"
          type="button"
          class="btn-anotacoes-cliente"
          data-i18n-title="chat.btn_notes_title"
          title="Anotações privadas">
          ✎
        </button>
      </div>

      <div id="chatClienteStatus" class="chat-status" data-i18n="chat.status_loading">carregando…</div>
    </div>
  </div>

  <button
    id="btnTransacoesCliente"
    type="button"
    class="btn-transacoes-cliente"
    data-i18n-title="chat.btn_transactions_title"
    title="Ver transações do cliente">
    $
  </button>
</header>


<!-- ÁREA DE MENSAGENS -->
<main id="chatBox" class="chat-box"></main>

<!-- INPUT FIXO -->

<footer class="chat-input">
  <button
    id="btnEnviarConteudo1"
    class="btn-midia"
    onclick="abrirPopupConteudos()"
    data-i18n-aria-label="chat.btn_media_label"
    aria-label="Enviar mídia"
  >
    <img src="/assets/midia.png" data-i18n-alt="chat.btn_media_label" alt="Mídia" />
  </button>

  <input
    id="msgInput"
    type="text"
    data-i18n-placeholder="chat.input_placeholder"
    placeholder="Digite uma mensagem..."
    autocomplete="off"/>

  <button
    class="btn-enviar1"
    onclick="enviarMensagem()"
    data-i18n-aria-label="chat.btn_send_label"
    aria-label="Enviar mensagem"
  >
    <img src="/assets/enviar.png" data-i18n-alt="chat.btn_send_label" alt="Enviar" />
  </button>
</footer>

<div id="popupConteudos" class="hidden">
  <div class="popup-backdrop" onclick="fecharPopupConteudos()"></div>
  <div class="popup-box">
    <h3 data-i18n="chat.popup_send_content_title">Enviar conteúdo</h3>

    <div class="preview-scroll">
      <div id="previewConteudos" class="preview-grid"></div>
    </div>

    <div class="popup-preco">
      <label data-i18n="chat.popup_price_label">Preço (R$)</label>
      <input type="number" id="precoConteudo" value="0" min="0" />
    </div>

    <div class="popup-actions">
      <button class="btn-cancelar" onclick="fecharPopupConteudos()" data-i18n="chat.btn_cancel">Cancelar</button>
      <button class="btn-enviar" onclick="confirmarEnvioConteudo()" data-i18n="chat.btn_send">Enviar</button>
    </div>
  </div>

</div>

<div id="menuMensagem" class="hidden">
  <div class="popup-backdrop" onclick="fecharMenuMensagem()"></div>

  <div class="popup-box">
    <h3 data-i18n="chat.popup_message_title">Mensagem</h3>

    <textarea id="editarTexto" data-i18n-placeholder="chat.edit_placeholder" placeholder="Editar mensagem..."></textarea>

    <div class="popup-actions">
      <button onclick="salvarEdicao()" data-i18n="chat.btn_save">Salvar</button>
      <button onclick="excluirMensagem()" data-i18n="chat.btn_delete">Excluir</button>
      <button onclick="fecharMenuMensagem()" data-i18n="chat.btn_cancel">Cancelar</button>
    </div>
  </div>
 </div>

  <div id="popupAnotacoesCliente" class="popup-anotacoes hidden">
    <div class="popup-anotacoes-backdrop"></div>

    <div class="popup-anotacoes-box">
      <button id="fecharPopupAnotacoes" class="popup-anotacoes-fechar" type="button">×</button>

      <h3 data-i18n="chat.notes_title">Anotações privadas</h3>

      <label for="inputResumoCliente" data-i18n="chat.notes_summary_label">Resumo curto</label>
      <input
        id="inputResumoCliente"
        type="text"
        maxlength="120"
        data-i18n-placeholder="chat.notes_summary_placeholder"
        placeholder="Ex: compra VIP, gosta de áudio, responde à noite">

      <label for="textareaNotaCliente" data-i18n="chat.notes_private_label">Informações privadas</label>
      <textarea
        id="textareaNotaCliente"
        rows="8"
        data-i18n-placeholder="chat.notes_private_placeholder"
        placeholder="Escreve aqui observações que só a modelo pode ver..."></textarea>

      <div class="popup-anotacoes-acoes">
        <button id="salvarAnotacoesCliente" type="button" data-i18n="chat.btn_save">Salvar</button>
      </div>
    </div>
  </div>

<div id="modalMidia" class="modal-midia hidden">

  <div class="modal-backdrop" onclick="fecharModalMidia()"></div>

  <div class="modal-conteudo">

    <button class="modal-close" onclick="fecharModalMidia()">✕</button>

    <img id="modalImg">

    <video id="modalVideo" controls playsinline preload="metadata"></video>

    <iframe
      id="modalIframe"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/header.js"></script>
<script src="/js/chat.js" defer></script>
</body>
</html>
