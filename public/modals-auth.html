<!-- AGE GATE +18 -->
<div id="ageModal" class="modal hidden">
  <div class="modal-overlay" onclick="confirmAge(false)"></div>
  <div class="modal-box" id="ageModalBox"></div>
</div>

<script>
  (function () {
    const box = document.getElementById("ageModalBox");
    if (box) {
      box.innerHTML = `
        <h2 data-i18n="index.ageGateTitle">A Velvet é uma plataforma social destinada para usuários maiores de idade.</h2>
        <p data-i18n="index.ageGateText" style="margin-top:10px;">
          Ao continuar, você declara que possui 18 anos ou mais e concorda com os Termos e Políticas da Velvet disponíveis para consulta em nossa pagina inicial.
        </p>
        <div style="display:flex; gap:12px; margin-top:20px;">
          <button class="btn btn-primary" onclick="confirmAge(true)" data-i18n="index.ageGateConfirm">Continuar</button>
          <button class="btn btn-secondary" onclick="confirmAge(false)" data-i18n="index.ageGateDeny">Sair</button>
        </div>`;
      if (typeof applyTranslations === "function") applyTranslations();
    }
  })();
</script>

<!-- LOGIN / REGISTER MODAL -->
<div id="loginModal" class="modal hidden">
  <div class="modal-overlay" onclick="closeLoginModal()"></div>

  <div class="modal-box">
    <h2 id="modalTitle">Entrar</h2>

    <!-- CAMPOS COMUNS -->
    <label for="loginEmail">Email</label>
    <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">

    <!-- VERIFICAÇÃO OTP (etapa 2 do registo) -->
    <div class="field hidden" id="fieldOtp">
      <p id="otpInfo" style="font-size:13px;color:#7a6a9a;margin:0 0 10px;line-height:1.5;"></p>
      <label for="registerOtp">Código de verificação</label>
      <input id="registerOtp" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
             placeholder="000000" autocomplete="one-time-code"
             style="letter-spacing:8px;font-size:22px;text-align:center;font-weight:700;">
      <p id="otpReenviar" style="font-size:12px;color:#9b87b8;margin-top:8px;text-align:right;display:none;">
        Não recebeste? <span onclick="enviarOTP()" style="color:#7B2CFF;cursor:pointer;font-weight:600;">Reenviar código</span>
      </p>
    </div>

    <!-- SENHA (etapa 1 login / etapa 3 registo) -->
    <div id="fieldSenhaComum" class="field">
      <label for="loginSenha">Senha</label>
      <input id="loginSenha" type="password" placeholder="Senha" autocomplete="current-password">
    </div>

    <!-- CAMPOS APENAS NO REGISTO (etapa 3) -->
    <div class="field hidden" id="fieldSenha">
      <label for="registerSenhaConfirm">Repita a sua senha</label>
      <input id="registerSenhaConfirm" type="password" autocomplete="new-password">
    </div>

    <div class="field hidden" id="fieldNome">
      <label for="registerNome">Nome Completo</label>
      <input id="registerNome" type="text" autocomplete="name">
    </div>

    <div class="field hidden" id="fieldNascimento">
      <label for="registerNascimento">Data de Nascimento</label>
      <input id="registerNascimento" type="date">
    </div>

    <div class="field hidden" id="fieldPerfil">
      <label for="registerRole">Tipo de conta</label>
      <select id="registerRole">
        <option value="cliente">Quero ser membro</option>
        <option value="modelo">Quero criar conteúdo</option>
      </select>
    </div>

    <!-- MENSAGEM DE ERRO MODAL -->
    <div id="modalError" style="display:none;background:#fff0f0;border:1px solid #ffb3b3;border-radius:8px;padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:4px;"></div>

    <!-- Confirmação de idade + termos (etapa 3) -->
    <div id="registerLegal" class="hidden" style="margin-top:8px;margin-bottom:4px;">
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
        <input type="checkbox" id="registerAgeConfirm"
               style="width:18px;height:18px;min-width:18px;margin-top:2px;accent-color:#7B2CFF;cursor:pointer;">
        <span style="font-size:12px;color:#666;line-height:1.6;">
          Confirmo que tenho mais de <strong style="color:#333;">18 anos</strong> e concordo com os
          <a href="/terms.html" target="_blank" style="color:#7B2CFF;font-weight:600;white-space:nowrap;">Termos e Condições de Uso</a>.
        </span>
      </label>
    </div>

    <button id="modalSubmit" class="btn btn-primary">
      Entrar
    </button>

    <p class="modal-switch hidden" id="switchToLogin">
      Já tem conta?
      <span onclick="switchToLogin()">Entrar</span>
    </p>
    <p class="modal-switch hidden" id="switchToRegister">
      Não tem conta??
      <span onclick="startRegister()">Criar conta</span>
    </p>

    <button class="modal-close" onclick="closeLoginModal()">✕</button>
  </div>
</div>
