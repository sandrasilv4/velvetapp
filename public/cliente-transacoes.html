<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transações do Cliente</title>
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/cliente-transacoes.css">
</head>
<body class="role-modelo">
  <div id="header-container"></div>

  <main class="pagina-transacoes">
    <div class="topo-transacoes">
      <button class="btn-voltar" onclick="history.back()">← Voltar ao chat</button>
    </div>

    <section class="cliente-faixa">
      <img id="clienteAvatar" class="cliente-avatar" src="/assets/avatar.png" alt="Avatar do cliente">
      <div class="cliente-info">
        <h1 id="clienteNome">Cliente</h1>
        <p id="clienteResumo">Carregando histórico...</p>
      </div>
    </section>

    <section class="resumo-linha">
      <div class="resumo-item">
        <span class="label">Total de compras</span>
        <strong id="totalCompras">0</strong>
      </div>

      <div class="resumo-item">
        <span class="label">Total pago</span>
        <strong id="totalPago">R$ 0,00</strong>
      </div>

      <div class="resumo-item">
        <span class="label">Conteúdos pagos</span>
        <strong id="totalConteudos">0</strong>
      </div>

      <div class="resumo-item">
        <span class="label">Assinaturas</span>
        <strong id="totalAssinaturas">0</strong>
      </div>
    </section>

    <section class="historico-box">
      <div class="historico-topo">
        <h2>Histórico</h2>
      </div>

      <div class="tabela-wrapper">
        <table class="tabela-transacoes">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tipo</th>
              <th>Data</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Detalhe</th>
            </tr>
          </thead>
          <tbody id="listaTransacoes">
            <tr>
              <td colspan="6" class="estado-tabela">Carregando transações...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/cliente-transacoes.js"></script>
</body>
</html>
