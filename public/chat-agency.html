<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7B2CFF">
  <title>Agency Chat</title>
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/chatmodelo.css">
  <link rel="stylesheet" href="/css/chat.css">
  <script src="/i18n.js"></script>
  <style>
    /* ─── BASE ─── */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #f7f7fb;
      font-family: "Poppins", "Inter", sans-serif;
    }

    #header-container {
      flex-shrink: 0;
    }

    /* ─── WRAPPER PRINCIPAL (abaixo do header) ─── */
    #agencyWrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 16px;
      box-sizing: border-box;
    }

    /* ─── LAYOUT DOIS PAINÉIS ─── */
    #agencyLayout {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 20px;
    }

    /* ─── PAINEL ESQUERDO: LISTA ─── */
    #agencyInbox {
      width: 260px;
      min-width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #9E6BFF;
      box-shadow: 0 6px 20px rgba(93,36,190,0.15);
      overflow: hidden;
    }

    #agencyInboxHeader {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #e9e9ef;
      flex-shrink: 0;
      font-size: 15px;
      font-weight: 600;
      color: #7B2CFF;
    }

    /* este é o elemento que o chat-agency.js usa para scroll infinito */
    #inboxPanel {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 10px;
    }

    /* ─── PAINEL DIREITO: CHAT ─── */
    #chatPanel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #9E6BFF;
      box-shadow: 0 6px 20px rgba(93,36,190,0.15);
      overflow: hidden;
    }

    /* ─── ESTADO VAZIO ─── */
    #agencyChatVazio {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #aaa;
      font-size: 14px;
    }

    /* esconde/mostra partes conforme estado */
    #chatPanel.vazio #agencyChatHeader  { display: none; }
    #chatPanel.vazio #chatBox           { display: none; }
    #chatPanel.vazio #agencyChatInput   { display: none; }
    #chatPanel.vazio #agencyChatVazio   { display: flex; }
    #chatPanel:not(.vazio) #agencyChatVazio { display: none; }

    /* ─── CABEÇALHO DO CHAT (sem position:fixed) ─── */
    #agencyChatHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #9E6BFF;
      flex-shrink: 0;
      background: #fff;
    }

    /* ─── MENSAGENS ─── */
    #chatBox {
      flex: 1 !important;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      height: auto !important;
      max-height: none !important;
      left: 300px !important; 
      right:20px !important;
      top: 120px !important;
      bottom: 90px !important;
      padding-bottom: 120px !important;
    }

    /* ─── INPUT ─── */
#agencyChatInput {
    position: fixed;
    bottom: 0;
    left: 300px;
    right: 20px;
    display: flex;
    gap: 10px;
    padding-top: 10px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    padding-left: max(14px, env(safe-area-inset-left, 14px));
    padding-right: max(14px, env(safe-area-inset-right, 14px));
    background: #ffffff1f;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
    font-size: 16px;
    justify-content: space-between;
    align-items: center;

}

#sendBtn {
  background: none !important;
  border: none;
  padding: 0px !important ;
}

#msgInput {
  flex: 1;
  max-width: 100%;
  height: 42px;
  border: 1px solid #9E6BFF;
  border-radius: 12px;
  padding: 0 14px;
  font-size: 16px;
  margin: 6px 0;
  border-bottom-right-radius: 4px;
  display: flex;
  flex-direction: column;
  min-width: 0;
  outline: none;
}


    /* ─── ITENS DA LISTA ─── */
    .chat-item {
      display: flex;
      flex-direction: column;
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f5;
      transition: background 0.15s;
    }

    .chat-item:hover {
      background: rgba(123, 44, 255, 0.07);
    }

    .chat-item-ativo {
      background: rgba(123, 44, 255, 0.12) !important;
    }

    .chat-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .chat-row-bottom {
      display: flex;
      justify-content: flex-end;
      min-height: 16px;
      margin-top: 2px;
    }

    .chat-item .chat-name {
      font-size: 13px;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .chat-item .chat-time {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chat-item .chat-status {
      font-size: 12px;
    }

    .status-unseen {
      font-size: 11px;
      font-weight: 700;
      background: #7B2CFF;
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(123,44,255,0.35);
      letter-spacing: 0.3px;
    }

    .status-read {
      font-size: 12px;
      color: #7B2CFF;
      font-weight: 600;
    }

    .status-sent {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body class="role-modelo">
  <!-- <div id="header-container"></div> -->

  <div id="agencyWrap">
    <div id="agencyLayout">

      <!-- ══════════ ESQUERDA: LISTA DE CONVERSAS ══════════ -->
      <div id="agencyInbox">
        <div id="agencyInboxHeader" data-i18n="inbox.title">Conversas</div>
        <!-- inboxPanel = referenciado pelo chat-agency.js para scroll infinito -->
        <div id="inboxPanel">
          <!-- inbox = onde o chat-agency.js injeta os .chat-item -->
          <div id="inbox"></div>
        </div>
      </div>

      <!-- ══════════ DIREITA: ÁREA DO CHAT ══════════ -->
      <div id="chatPanel" class="vazio">

        <!-- placeholder vazio -->
        <div id="agencyChatVazio">
          <span style="font-size:36px;">💬</span>
          <p>Selecione uma conversa</p>
        </div>

        <!-- cabeçalho (ID próprio, sem .chat-topo para não conflituar) -->
        <div id="agencyChatHeader">
          <div class="chat-cliente-info">
            <img id="chatClienteAvatar" class="chat-avatar" src="/assets/avatar.png"
                 data-i18n-alt="chat.client_avatar_alt" alt="Avatar cliente" />
            <div class="chat-cliente-texto">
              <div class="chat-nome-linha">
                <div id="chatClienteNome" class="chat-nome"
                     data-i18n="chat.client_name_placeholder">Cliente</div>
                <span id="chatClienteResumo" class="chat-cliente-resumo"
                      style="display:none;"></span>
                <button id="btnAnotacoesCliente" type="button"
                        class="btn-anotacoes-cliente"
                        data-i18n-title="chat.btn_notes_title"
                        title="Anotações privadas">✎</button>
              </div>
              <div id="chatClienteStatus" class="chat-status"
                   data-i18n="chat.status_loading">carregando…</div>
            </div>
          </div>
          <button id="btnTransacoesCliente" type="button"
                  class="btn-transacoes-cliente"
                  data-i18n-title="chat.btn_transactions_title"
                  title="Ver transações do cliente">$</button>
        </div>

        <!-- mensagens -->
        <div id="chatBox" class="chat-box"></div>

        <!-- input (ID próprio, sem .chat-input para não conflituar) -->
        <div id="agencyChatInput">
          <button id="btnEnviarConteudo1" class="btn-midia"
                  onclick="abrirPopupConteudos()"
                  aria-label="Enviar mídia">
            <img src="/assets/midia.png" alt="Mídia" />
          </button>
          <input id="msgInput" type="text"
                 data-i18n-placeholder="chat.input_placeholder"
                 placeholder="Digite uma mensagem…"
                 autocomplete="off" />
          <button id="sendBtn" class="btn-enviar1"
                  aria-label="Enviar mensagem">
            <img src="/assets/enviar.png" alt="Enviar" />
          </button>
        </div>

      </div><!-- /#chatPanel -->

    </div><!-- /#agencyLayout -->
  </div><!-- /#agencyWrap -->


  <!-- ══════════ POPUP: ENVIAR CONTEÚDO ══════════ -->
  <div id="popupConteudos" class="hidden">
    <div class="popup-backdrop" onclick="fecharPopupConteudos()"></div>
    <div class="popup-box">
      <h3 data-i18n="chat.popup_send_content_title">Enviar conteúdo</h3>
      <div class="preview-scroll">
        <div id="previewConteudos" class="preview-grid"></div>
      </div>
      <div class="popup-preco">
        <label data-i18n="chat.popup_price_label">Preço (R$)</label>
        <input type="number" id="precoConteudo" value="0" min="0" />
      </div>
      <div class="popup-actions">
        <button class="btn-cancelar" onclick="fecharPopupConteudos()"
                data-i18n="chat.btn_cancel">Cancelar</button>
        <button class="btn-enviar" onclick="confirmarEnvioConteudo()"
                data-i18n="chat.btn_send">Enviar</button>
      </div>
    </div>
  </div>

  <!-- ══════════ POPUP: MENU MENSAGEM ══════════ -->
  <div id="menuMensagem" class="hidden">
    <div class="popup-backdrop" onclick="fecharMenuMensagem()"></div>
    <div class="popup-box">
      <h3 data-i18n="chat.popup_message_title">Mensagem</h3>
      <textarea id="editarTexto"
                data-i18n-placeholder="chat.edit_placeholder"
                placeholder="Editar mensagem…"></textarea>
      <div class="popup-actions">
        <button onclick="salvarEdicao()"    data-i18n="chat.btn_save">Salvar</button>
        <button onclick="excluirMensagem()" data-i18n="chat.btn_delete">Excluir</button>
        <button onclick="fecharMenuMensagem()" data-i18n="chat.btn_cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- ══════════ POPUP: ANOTAÇÕES ══════════ -->
  <div id="popupAnotacoesCliente" class="popup-anotacoes hidden">
    <div class="popup-anotacoes-backdrop"></div>
    <div class="popup-anotacoes-box">
      <button id="fecharPopupAnotacoes" class="popup-anotacoes-fechar" type="button">×</button>
      <h3 data-i18n="chat.notes_title">Anotações privadas</h3>
      <label for="inputResumoCliente" data-i18n="chat.notes_summary_label">Resumo curto</label>
      <input id="inputResumoCliente" type="text" maxlength="120"
             data-i18n-placeholder="chat.notes_summary_placeholder"
             placeholder="Ex: compra VIP, gosta de áudio, responde à noite">
      <label for="textareaNotaCliente" data-i18n="chat.notes_private_label">Informações privadas</label>
      <textarea id="textareaNotaCliente" rows="8"
                data-i18n-placeholder="chat.notes_private_placeholder"
                placeholder="Escreve aqui observações que só a modelo pode ver…"></textarea>
      <div class="popup-anotacoes-acoes">
        <button id="salvarAnotacoesCliente" type="button"
                data-i18n="chat.btn_save">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ══════════ MODAL: MÍDIA ══════════ -->
  <div id="modalMidia" class="modal-midia hidden">
    <div class="modal-backdrop" onclick="fecharModalMidia()"></div>
    <div class="modal-box modal-midia-box">
      <button class="modal-close" onclick="fecharModalMidia()">✕</button>
      <img id="modalImg">
      <video id="modalVideo" controls playsinline preload="metadata"></video>
      <iframe id="modalIframe"
              allow="autoplay; fullscreen; picture-in-picture"
              allowfullscreen></iframe>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/chat-agency.js" defer></script>
</body>
</html>
